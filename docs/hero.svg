<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 340" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" role="img" aria-label="tracelens turns a raw LLM trace into a human-reviewable, scorable conversation">
  <rect width="880" height="340" fill="#ffffff"/>
  <text x="36" y="42" font-size="25" font-weight="700" fill="#0f172a">tracelens</text>
  <text x="168" y="42" font-size="14.5" fill="#64748b">— make LLM traces human-reviewable</text>

  <!-- LEFT: raw trace -->
  <rect x="36" y="66" width="350" height="226" rx="12" fill="#0f172a"/>
  <text x="56" y="92" font-size="11.5" font-weight="700" fill="#94a3b8" letter-spacing="0.5">RAW TRACE — what observability shows</text>
  <g font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11">
    <text x="56" y="120" fill="#cbd5e1">{ "observations": [</text>
    <text x="70" y="139" fill="#cbd5e1">{ "type": "GENERATION",</text>
    <text x="84" y="158" fill="#cbd5e1">"output": "{\"type\":\"compare\",</text>
    <text x="98" y="177" fill="#64748b">\"rows\":[{\"cells\":[{\"t\"…</text>
    <text x="70" y="196" fill="#cbd5e1">&lt;table type=\"start\"/&gt;</text>
    <text x="70" y="215" fill="#cbd5e1">&lt;row values=[…] /&gt; …</text>
    <text x="56" y="240" fill="#64748b">… nested JSON + custom tags</text>
  </g>
  <text x="56" y="276" font-size="12" fill="#f87171">✗ unreadable for PM · QA · ops</text>

  <!-- arrow -->
  <text x="404" y="172" font-size="34" font-weight="300" fill="#2563eb">→</text>
  <text x="398" y="198" font-size="10.5" font-weight="700" fill="#2563eb">Renderer</text>

  <!-- RIGHT: reviewable -->
  <rect x="494" y="66" width="350" height="226" rx="12" fill="#fbfcfe" stroke="#e2e8f0"/>
  <text x="514" y="92" font-size="11.5" font-weight="700" fill="#64748b" letter-spacing="0.5">HUMAN-REVIEWABLE — what tracelens shows</text>
  <rect x="514" y="104" width="310" height="28" rx="8" fill="#eff5ff" stroke="#dbe7ff"/>
  <text x="526" y="122" font-size="11.5" fill="#1e293b">👤  Compare these two trip packages</text>
  <rect x="514" y="140" width="310" height="90" rx="8" fill="#ffffff" stroke="#e8ebef"/>
  <text x="526" y="157" font-size="10.5" fill="#64748b">🤖 compare-agent</text>
  <line x1="514" y1="164" x2="824" y2="164" stroke="#eef0f3"/>
  <text x="526" y="182" font-size="11" font-weight="600" fill="#334155">Duration</text>
  <text x="636" y="182" font-size="11" fill="#1e293b">3 Days</text>
  <text x="744" y="182" font-size="11" fill="#1e293b">4 Days</text>
  <text x="526" y="206" font-size="11" font-weight="600" fill="#334155">Pace</text>
  <text x="636" y="206" font-size="11" fill="#dc2626">● Packed</text>
  <text x="744" y="206" font-size="11" fill="#16a34a">● Relaxed</text>
  <rect x="514" y="238" width="310" height="40" rx="8" fill="#ffffff" stroke="#e8ebef"/>
  <text x="526" y="263" font-size="11" font-weight="600" fill="#334155">Helpfulness</text>
  <rect x="636" y="247" width="22" height="22" rx="5" fill="#fff" stroke="#e2e8f0"/><text x="643" y="262" font-size="11" fill="#475569">3</text>
  <rect x="663" y="247" width="22" height="22" rx="5" fill="#dbeafe" stroke="#2563eb"/><text x="670" y="262" font-size="11" fill="#1e40af">4</text>
  <rect x="690" y="247" width="22" height="22" rx="5" fill="#fff" stroke="#e2e8f0"/><text x="697" y="262" font-size="11" fill="#475569">5</text>
  <rect x="752" y="247" width="62" height="22" rx="5" fill="#2563eb"/><text x="762" y="262" font-size="10" fill="#ffffff">Submit →</text>

  <text x="36" y="322" font-size="12.5" fill="#475569">A pluggable rendering &amp; scoring layer on top of Langfuse · zero runtime deps · the human-judgment layer of the eval loop</text>
</svg>
