name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm install --no-audit --no-fund
      - name: typecheck
        run: npm run typecheck
      - name: self-checks (core contracts, adapter, review-ui)
        run: npm run verify
      - name: build zero-backend demo
        run: npm run demo
